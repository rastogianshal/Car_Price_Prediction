<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            font-family: Arial, sans-serif;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            width:400px;
            text-align:center;
            box-shadow:0px 0px 20px rgba(0,0,0,0.3);
        }

        h1{
            color:#1e3c72;
        }

        input,select{
            width:90%;
            padding:10px;
            margin:8px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            width:95%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#1e3c72;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2a5298;
        }

        h2{
            color:green;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>🚗 Car Price Predictor</h1>

    <form action="/predict" method="post">

        <input type="number" name="year" placeholder="Year" required>

        <input type="number" step="0.01" name="present_price" placeholder="Present Price" required>

        <input type="number" name="kms_driven" placeholder="Kms Driven" required>

        <select name="fuel_type">
            <option value="0">Petrol</option>
            <option value="1">Diesel</option>
            <option value="2">CNG</option>
        </select>

        <select name="seller_type">
            <option value="0">Dealer</option>
            <option value="1">Individual</option>
        </select>

        <select name="transmission">
            <option value="0">Manual</option>
            <option value="1">Automatic</option>
        </select>

        <input type="number" name="owner" placeholder="Owner Count" required>

        <button type="submit">Predict Price</button>

    </form>

    <h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
